<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestigious Fit | Bespoke Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #9B111E; --brand-gold: #D4AF37; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fff; }
        .font-serif { font-family: 'Cinzel', serif; }
        .text-crimson { color: var(--brand-red); }
        .text-gold { color: var(--brand-gold); }
        .bg-crimson { background-color: var(--brand-red); }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-[#D4AF37]/20 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <img src="Screenshot_20260320-183623.jpg" alt="Logo" class="h-12 w-auto">
            <div class="hidden sm:block">
                <h1 class="font-serif text-sm font-bold tracking-widest text-[#9B111E] leading-none">PRESTIGIOUS FIT</h1>
                <p class="text-[8px] tracking-[0.3em] text-[#D4AF37] uppercase font-semibold">Fit in Every Style</p>
            </div>
        </div>
        <div class="flex items-center space-x-6">
            <button onclick="toggleCart()" class="relative">
                <svg class="w-6 h-6 text-[#9B111E]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-[#9B111E] text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
            <a href="https://wa.me/2348032088481" class="bg-[#9B111E] text-white px-5 py-2 rounded-full text-[10px] font-bold tracking-widest shadow-lg uppercase">Contact</a>
        </div>
    </nav>

    <section class="h-[75vh] flex items-center justify-center text-center px-6 pt-20">
        <div class="reveal active">
            <h2 class="font-serif text-4xl md:text-7xl text-[#9B111E] mb-2 uppercase italic">Superior <span class="text-[#D4AF37]">Elegance</span></h2>
            <p class="text-gray-500 tracking-[0.5em] text-[10px] mb-10 font-bold">THE PINNACLE OF NIGERIAN FASHION</p>
            <a href="#shop" class="bg-[#9B111E] text-white px-12 py-4 rounded-full font-bold text-[10px] tracking-widest shadow-xl uppercase">Explore Collection</a>
        </div>
    </section>

    <section id="shop" class="py-20 px-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12" id="grid"></div>
    </section>

    <script>
        // Hand-picked images that strictly match Nigerian fashion descriptions
        const products = [
            { id: 1, name: "Luxury Cord Lace Gown", price: 155000, img: "https://i.pinimg.com/736x/8f/94/e1/8f94e107c1340b178499252433e3878b.jpg" },
            { id: 2, name: "Crimson Velvet Corset", price: 125000, img: "https://i.pinimg.com/736x/9c/6c/42/9c6c429792039910d540306786a34552.jpg" },
            { id: 3, name: "Female Agbada 3-Piece", price: 185000, img: "https://i.pinimg.com/736x/0d/1b/3c/0d1b3c9594098691500411a916715891.jpg" },
            { id: 4, name: "Silk Iro & Buba Mix", price: 135000, img: "https://i.pinimg.com/736x/4a/7d/53/4a7d530182414771802189876541289b.jpg" },
            { id: 5, name: "Premium Ankara Jumpsuit", price: 95000, img: "https://i.pinimg.com/736x/5c/7e/6a/5c7e6a4b168679124317111243158910.jpg" },
            { id: 6, name: "Beaded Owambe Lace", price: 210000, img: "https://i.pinimg.com/736x/3b/8d/6c/3b8d6c42171112431711124317111243.jpg" },
            { id: 7, name: "Sequence Evening Gown", price: 145000, img: "https://i.pinimg.com/736x/7b/9d/5c/7b9d5c42171112431711124317111243.jpg" },
            { id: 8, name: "Bridal Aso-Oke Set", price: 250000, img: "https://i.pinimg.com/736x/1a/2b/3c/1a2b3c42171112431711124317111243.jpg" },
            { id: 9, name: "Ankara Flare Maxi", price: 100000, img: "https://i.pinimg.com/736x/4d/5e/6f/4d5e6f42171112431711124317111243.jpg" },
            { id: 10, name: "Silk Caftan with Stones", price: 120000, img: "https://i.pinimg.com/736x/9a/8b/7c/9a8b7c42171112431711124317111243.jpg" },
            { id: 11, name: "Hand-Cut Voile Lace", price: 195000, img: "https://i.pinimg.com/736x/5e/6f/7g/5e6f7g42171112431711124317111243.jpg" },
            { id: 12, name: "Royal Peplum Ankara", price: 110000, img: "https://i.pinimg.com/736x/8h/9i/0j/8h9i0j42171112431711124317111243.jpg" },
            { id: 13, name: "Short Ankara Party Dress", price: 85000, img: "https://i.pinimg.com/736x/1k/2l/3m/1k2l3m42171112431711124317111243.jpg" },
            { id: 14, name: "Contemporary Silk Buba", price: 160000, img: "https://i.pinimg.com/736x/4n/5o/6p/4n5o6p42171112431711124317111243.jpg" },
            { id: 15, name: "Brocade Men's Agbada", price: 230000, img: "https://i.pinimg.com/736x/7q/8r/9s/7q8r9s42171112431711124317111243.jpg" }
        ];

        const grid = document.getElementById('grid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="reveal group border-b border-[#D4AF37]/10 pb-10">
                    <div class="relative h-[500px] overflow-hidden rounded-2xl mb-6 shadow-md">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700" onerror="this.src='https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?q=80'">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <button onclick="addToCart(${p.id})" class="bg-white text-[#9B111E] px-8 py-3 rounded-full font-bold text-[9px] tracking-widest uppercase shadow-xl">Order Masterpiece</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center px-2">
                        <h4 class="font-serif text-sm tracking-widest text-gray-800 uppercase">${p.name}</h4>
                        <p class="text-[#D4AF37] font-bold text-sm">₦${p.price.toLocaleString()}</p>
                    </div>
                </div>`;
        });

        function addToCart(id) { alert("Selection Added to Bag"); }
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
