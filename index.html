<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestigious Fit | Luxury Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-red: #9B111E; --p-gold: #D4AF37; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f4f4; }
        .font-serif { font-family: 'Cinzel', serif; }
        .jumia-card { transition: transform 0.3s ease, box-shadow 0.3s ease; border: 1px solid #eee; }
        .jumia-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .bg-red-brand { background-color: #9B111E; }
        .text-gold-brand { color: #D4AF37; }
    </style>
</head>
<body>

    <nav class="sticky top-0 w-full z-50 bg-white shadow-md px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <img src="Screenshot_20260320-183623.jpg" alt="Logo" class="h-12 w-auto">
            <div>
                <h1 class="font-serif text-sm font-bold text-[#9B111E] leading-none uppercase">Prestigious Fit</h1>
                <p class="text-[7px] text-[#D4AF37] font-bold tracking-widest uppercase">Fashion LTD</p>
            </div>
        </div>
        <a href="https://wa.me/2348032088481" class="bg-[#9B111E] text-white px-5 py-2 rounded text-[10px] font-bold uppercase shadow-sm">Order Now</a>
    </nav>

    <section class="py-10 px-4 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-end">
            <h2 class="font-serif text-2xl text-gray-900 border-l-4 border-[#9B111E] pl-3 uppercase">Top Collections</h2>
            <span class="text-[10px] font-bold text-[#9B111E] uppercase cursor-pointer">View All ></span>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-6" id="main-grid"></div>
    </section>

    <script>
        const products = [
            { name: "Prestige 3-in-1 Bridal Gown", price: 550000, img: "gown.jpg", tag: "Best Seller" },
            { name: "Prestige Bridal Gown", price: 550000, img: "gown.jpg", tag: "New Arrival" },
            { name: "Executive Fit Piece", price: 100000, img: "100k Executive.jpg" },
            { name: "Funnel Corset", price: 50000, img: "50kfitfunnelcorset.jpg" },
            { name: "Premium Aso-Oke", price: 55000, img: "55kfitAso-Oke.jpg" },
            { name: "Puff Shirt & Skirt", price: 60000, img: "60kFitpuffshirtandskirt.jpg" },
            { name: "Wura Fit Gown", price: 30000, img: "30kWura-fitgown.jpg" },
            { name: "Fit Event Gown", price: 45000, img: "45kfiteventgown.jpg" },
            { name: "Elation Hoodie & Jogger", price: 55000, img: "55kelationhoodie&jogger.jpg" },
            { name: "Black Drape Gown", price: 25000, img: "25kfitblackdrapegown.jpg" }
        ];

        const grid = document.getElementById('main-grid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="bg-white rounded overflow-hidden jumia-card flex flex-col">
                    <div class="relative h-[200px] md:h-[320px]">
                        <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover">
                        ${p.tag ? `<span class="absolute top-2 left-2 bg-yellow-500 text-white text-[8px] font-bold px-2 py-1 rounded shadow-sm uppercase">${p.tag}</span>` : ''}
                    </div>
                    <div class="p-3 flex flex-col flex-grow">
                        <h4 class="text-[10px] md:text-xs font-bold text-gray-700 uppercase mb-1 truncate">${p.name}</h4>
                        <p class="text-[#9B111E] font-black text-sm md:text-base mb-3">₦${p.price.toLocaleString()}</p>
                        <button class="mt-auto w-full bg-gray-900 text-white py-2 rounded text-[9px] font-bold uppercase hover:bg-[#9B111E] transition">Order Now</button>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
